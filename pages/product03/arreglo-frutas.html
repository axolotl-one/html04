<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../main/style-basic.css">
    <link rel="stylesheet" href="./pract03.css">
    <title>Arreglo de Frutas</title>
</head>
<body>
    <nav>
        <header><h1>Seleeciona las frutas para anexar a la lista</h1></header>
        <main>
            <section id="frutas">
                <img class="frutas" id="aguacate" src="./assets/avocado.png" alt="Aguacate">
                <img class="frutas" id="arandanos" src="./assets/berries.png" alt="Arandanos">
                <img class="frutas" id="cerezas" src="./assets/cherries.png" alt="Cerezas">
                <img class="frutas" id="lima" src="./assets/lemon.png" alt="Lima">
                <img class="frutas" id="mango" src="./assets/mango.png" alt="Mango">
                <img class="frutas" id="manzana" src="./assets/apple.png" alt="Manzana">
                <img class="frutas" id="naranja" src="./assets/orange.png" alt="Naranja">
                <img class="frutas" id="piña" src="./assets/pineapple.png" alt="Piña">
                <img class="frutas" id="platano" src="./assets/banana.png" alt="Platano">
                <img class="frutas" id="sandia" src="./assets/watermelon.png" alt="Sandía">
                <img class="frutas" id="uvas" src="./assets/grapes.png" alt="Uvas">
            </section>
            <section id="controles">
                <input id="input-captura" class="opcion-mono" type="text" disabled>
                <div class="opcion-doble">
                    <button id="btn-borrar-lista">Borrar Lista</button>
                    <button id="btn-mostrar-lista">Mostrar Lista</button>
                </span>
            </section>
            <section id="vista-arreglo" class="vista-text">
                <div id="vista-arr-nav" class="vista-text-nav"><span>Lista de Frutas Seleccionadas: </span><button id="btn-vista-fuera">x</button></div>
                <div id="vista-arr-msj"></div>
            </section>
        </main>
        <footer>
            <details id="info-version"></details>
        </footer>
    </nav>
    <script src="../main/version.js"></script>
    <script src="./array-frutas.js"></script>
</body>
</html>
