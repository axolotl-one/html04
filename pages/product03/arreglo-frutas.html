<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../main/style-basic.css">
    <link rel="stylesheet" href="./pract03.css">
    <title>Arreglo de Frutas</title>
</head>
<body>
    <header><h1>Seleeciona las frutas para anexar a la lista</h1></header>
    <main>
        <div class="frutas" id="aguacate"><img src="./assets/avocado.png" alt="Aguacate"></div>
        <div class="frutas" id="arandanos"><img src="./assets/berries.png" alt="Arandanos"></div>
        <div class="frutas" id="cerezas"><img src="./assets/cherries.png" alt="Cerezas"></div>
        <div class="frutas" id="lima"><img src="./assets/lemon.png" alt="Lima"></div>
        <div class="frutas" id="mango"><img src="./assets/mango.png" alt="Mango"></div>
        <div class="frutas" id="manzana"><img src="./assets/apple.png" alt="Manzana"></div>
        <div class="frutas" id="naranja"><img src="./assets/orange.png" alt="Naranja"></div>
        <div class="frutas" id="piña"><img src="./assets/pineapple.png" alt="Piña"></div>
        <div class="frutas" id="platano"><img src="./assets/banana.png" alt="Platano"></div>
        <div class="frutas" id="sandia"><img src="./assets/watermelon.png" alt="Sandía"></div>
        <div class="frutas" id="uvas"><img src="./assets/grapes.png" alt="Uvas"></div>
    </main>
    <footer>
        <button id="mostrarLista">Mostrar Lista</button>
    </footer>
    <script src="./array-frutas.js"></script>
</body>
</html>
